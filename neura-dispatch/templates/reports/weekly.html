<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{ title }}</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 40px;
            background: #f7f7f8;
            color: #1f2933;
        }

        main {
            max-width: 960px;
            margin: 0 auto;
            background: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin-top: 0;
        }

        .note {
            color: #52606d;
            line-height: 1.5;
        }

        code {
            background: #eef2f7;
            padding: 2px 6px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
<main>
    <h1>{{ title }}</h1>

    <p class="note">
        Scaffold is running. Next commit will add database models for the 15-minute input time series
        and dispatch outputs.
    </p>

    <p class="note">
        Required endpoint: <code>/reports/weekly/</code>
    </p>
</main>
</body>
</html>
